<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Profesional - Versión 6.2.1 (Estabilización de Duplicados)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.5s ease;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .chrome-tab-container {
            @apply flex gap-1 bg-slate-100/80 pt-2 px-4 rounded-t-[2.5rem] border-b border-slate-200;
        }

        .chrome-tab {
            @apply relative px-5 py-3 text-[10px] font-extrabold uppercase tracking-widest cursor-pointer transition-all rounded-t-xl text-slate-400 flex items-center gap-2;
            min-width: 140px;
            justify-content: center;
            border: none;
            outline: none;
            background: transparent;
        }

        .chrome-tab-active {
            @apply bg-white shadow-[0_-2px_8px_rgba(0, 0, 0, 0.03)] z-10 text-slate-700;
        }

        .chrome-tab-active::before,
        .chrome-tab-active::after {
            content: '';
            @apply absolute bottom-0 w-3 h-3 bg-transparent pointer-events-none;
        }

        .chrome-tab-active::before {
            left: -12px;
            @apply rounded-br-xl;
            box-shadow: 6px 0 0 0 white;
        }

        .chrome-tab-active::after {
            right: -12px;
            @apply rounded-bl-xl;
            box-shadow: -6px 0 0 0 white;
        }

        @keyframes pulse-sync {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.98);
            }
        }

        .sync-active {
            animation: pulse-sync 2s infinite ease-in-out;
        }

        .warning-shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-3px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(3px, 0, 0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const THEMES = {
            ocean: { primary: '#0ea5e9', bg: 'bg-sky-50' },
            emerald: { primary: '#10b981', bg: 'bg-emerald-50' },
            sunset: { primary: '#f59e0b', bg: 'bg-amber-50' },
            berry: { primary: '#8b5cf6', bg: 'bg-violet-50' }
        };

        const INTERES_OPTIONS = [
            "Sin interés <No muestra intención real de avanzar>",
            "Interés Bajo <Escucha, pregunta poco, no toma acción.>",
            "Interés Medio <Hace preguntas, pide información, evalúa.>",
            "Interés Alto <Quiere avanzar, pregunta por precio, tiempos o pasos.>"
        ];

        const ESTADO_OPTIONS = ["Seguimiento", "Venta", "Contactar más tarde", "No interesado"];

        const getMexicoDate = () => {
            return new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/Mexico_City',
                year: 'numeric', month: '2-digit', day: '2-digit'
            }).format(new Date());
        };

        const normalizeData = (data) => {
            if (!data) return {};
            const normalized = { ...data };
            for (let i = 1; i <= 30; i++) {
                const sqlFecha = `fecha_seguimiento_${i}`;
                const sqlNota = `notas_seguimiento_${i}`;
                const uiFecha = `Fecha Seguimiento ${i}`;
                const uiNota = `Notas Seguimiento ${i}`;
                if (data[sqlFecha] !== undefined) normalized[uiFecha] = data[sqlFecha];
                if (data[sqlNota] !== undefined) normalized[uiNota] = data[sqlNota];
            }
            normalized.Nombre = data.nombre || data.Nombre || "Sin Nombre";
            normalized.Canal = data.canal || data.Canal || data['Canal (Tel/WhatsApp)'] || "";
            normalized['Estado Final'] = data.estado_final || data['Estado Final'] || "Seguimiento";
            normalized['Nivel de Interés'] = data.nivel_interes || data['Nivel de Interés'] || "";
            normalized['Fecha Próx. Contacto'] = data.fecha_proxima || data['Fecha Próx. Contacto'] || "";
            normalized['Fecha 1er Contacto'] = data.fecha_registro || data['Fecha 1er Contacto'] || "";
            normalized['Resumen Conversación'] = data.resumen || data['Resumen Conversación'] || "";
            normalized.Comentarios = data.comentarios || data.Comentarios || "";
            normalized.Imagenes = data.imagenes_url || data.Imagenes || "";
            const TRANSLATE = {
                'AL DIA': 'En tiempo',
                'ALERTA': 'Retraso',
                'VENCIDO': 'Acción Necesaria',
                'Acción necesaria': 'Acción Necesaria'
            };
            const rawRend = data.rendimiento || "Sin Cita";
            normalized.rendimiento = TRANSLATE[rawRend] || rawRend;
            const cleanPhone = normalized.Canal.toString().replace(/\D/g, '').slice(-10);
            normalized.id_unico = data.id_unico || `ID_${cleanPhone}`;
            return normalized;
        };

        const generateSyncId = () => `ID_${Date.now()}_${Math.random().toString(36).substr(2, 5).toUpperCase()}`;

        const toInputDate = (str) => {
            if (!str || !str.includes('/')) return str || '';
            const [d, m, y] = str.split('/');
            return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
        };

        const toSheetDate = (str) => {
            if (!str) return '';
            if (str.includes('/')) return str;
            const [y, m, d] = str.split('-');
            return `${d}/${m}/${y}`;
        };

        const LoginScreen = ({ agents, onLogin, loading, theme }) => {
            const [sel, setSel] = useState('');
            const [pass, setPass] = useState('');
            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-6">
                    <div className="max-w-md w-full glass p-12 rounded-[4rem] shadow-2xl text-center border border-white">
                        <div className="w-24 h-24 mx-auto rounded-[2.5rem] flex items-center justify-center text-white mb-10 shadow-2xl" style={{ backgroundColor: theme.primary }}><i className="fas fa-fingerprint text-4xl"></i></div>
                        <h2 className="text-3xl font-black text-slate-800 tracking-tighter uppercase mb-12 leading-none">Acceso Seguro<br />CRM Handshake</h2>
                        <div className="space-y-6 text-left">
                            <select className="w-full p-5 rounded-2xl bg-slate-50 font-bold text-sm border-none outline-none shadow-inner cursor-pointer" value={sel} onChange={e => setSel(e.target.value)}>
                                <option value="">Seleccionar Asesora...</option>
                                {agents.map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                            <input type="password" placeholder="Clave de Acceso" className="w-full p-4 rounded-2xl bg-slate-50 font-bold text-sm border-none outline-none shadow-inner" value={pass} onChange={e => setPass(e.target.value)} />
                            <button onClick={() => onLogin(sel, pass)} disabled={loading || !sel || !pass} className="w-full py-6 rounded-3xl text-white font-black text-base shadow-2xl transition-all hover:brightness-110 uppercase tracking-widest border-none outline-none cursor-pointer" style={{ backgroundColor: theme.primary }}>{loading ? 'CARGANDO...' : 'ENTRAR'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(localStorage.getItem('crm_user') || null);
            const [themeKey, setThemeKey] = useState(localStorage.getItem('crm_theme') || 'ocean');
            const [agents, setAgents] = useState([]);
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(false);
            const [modal, setModal] = useState(null);
            const [selectedClient, setSelectedClient] = useState(null);
            const [filters, setFilters] = useState({ name: '', status: '', interest: '', dateRange: '' });
            const [statusAlert, setStatusAlert] = useState(null);
            const [pendingCount, setPendingCount] = useState(0);
            const [showHistoryModal, setShowHistoryModal] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const [calendarEvents, setCalendarEvents] = useState([]);
            const [loadingCalendar, setLoadingCalendar] = useState(false);
            const [showCalendar, setShowCalendar] = useState(false);

            // --- INICIO MÓDULO POOL ---
            const [activeTab, setActiveTab] = useState('Mis Prospectos');
            const [poolData, setPoolData] = useState([]);
            const [poolLoading, setPoolLoading] = useState(false);
            const [poolModalClient, setPoolModalClient] = useState(null);
            const [currentPagePool, setCurrentPagePool] = useState(1);
            // --- FIN MÓDULO POOL ---

            const isSyncing = useRef(false);
            const entriesPerPage = 15;

            const activeTheme = useMemo(() => THEMES[themeKey] || THEMES.ocean, [themeKey]);

            useEffect(() => {
                fetchAgents();
                if (user) {
                    fetchClients(user);
                    processQueue();
                }
                const interval = setInterval(processQueue, 30000);
                return () => clearInterval(interval);
            }, [user]);

            useEffect(() => { setCurrentPage(1); }, [filters]);

            // --- INICIO MÓDULO POOL ---
            const fetchPool = async () => {
                setPoolLoading(true);
                try {
                    const res = await fetch('https://crmasesorasapi.libresdeumas.com/api/pool');
                    const data = await res.json();
                    setPoolData(data || []);
                } catch (e) { console.error(e); }
                setPoolLoading(false);
            };

            const takePool = async (lead_id) => {
                try {
                    const res = await fetch('https://crmasesorasapi.libresdeumas.com/api/pool/take', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lead_id, nombre_asesora: user })
                    });
                    const data = await res.json();
                    if (!res.ok || data.status === 'error') {
                        setStatusAlert({ type: 'error', title: 'Error', message: data.message || 'Error al apartar.' });
                    } else {
                        fetchPool();
                    }
                } catch (e) { console.error(e); }
            };

            const myBlockedCount = useMemo(() => poolData.filter(p => p.status === `BLOQUEADO_${user}`).length, [poolData, user]);

            const PoolView = () => {
                const [selectedIds, setSelectedIds] = useState([]);

                const misReclamados = poolData.filter(p => p.status === `BLOQUEADO_${user}`);
                const poolLibre = poolData.filter(p => !p.status || p.status === 'NSH' || p.status === 'LIBRE');

                const allowedSelection = Math.max(0, 10 - misReclamados.length);

                const handleToggleSelection = (folio_i) => {
                    if (selectedIds.includes(folio_i)) {
                        setSelectedIds(selectedIds.filter(id => id !== folio_i));
                    } else {
                        if (selectedIds.length < allowedSelection) {
                            setSelectedIds([...selectedIds, folio_i]);
                        }
                    }
                };

                const handleTakeMultiple = async () => {
                    if (selectedIds.length === 0) return;
                    setPoolLoading(true);
                    for (let id of selectedIds) {
                        try {
                            await fetch('https://crmasesorasapi.libresdeumas.com/api/pool/take', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ lead_id: id, nombre_asesora: user })
                            });
                        } catch (e) { console.error(e); }
                    }
                    setSelectedIds([]);
                    fetchPool();
                };

                const poolLibrePaginated = poolLibre.slice((currentPagePool - 1) * 50, currentPagePool * 50);
                const totalPoolPages = Math.ceil(poolLibre.length / 50);

                return (
                    <div className="animate-in fade-in">
                        <div className="mb-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                            <p className="text-xs font-black text-slate-500 uppercase tracking-widest">
                                Bloqueados en tu posesión: <span className={misReclamados.length >= 10 ? 'text-red-500' : 'text-emerald-500'}>{misReclamados.length}/10</span>
                            </p>
                        </div>

                        <h3 className="text-sm font-black text-slate-700 uppercase tracking-widest mb-2 px-4 mt-2">Mis Reclamados</h3>
                        <div className="glass rounded-[3rem] shadow-sm mb-8 overflow-hidden border border-white">
                            <div className="overflow-x-auto custom-scroll">
                                <table className="w-full text-left table-auto">
                                    <thead className="bg-slate-50/50 border-b border-slate-100 text-slate-400 text-[10px] uppercase font-black tracking-widest">
                                        <tr>
                                            <th className="px-8 py-5"># Folio</th>
                                            <th className="px-8 py-5">Teléfono o Canal</th>
                                            <th className="px-8 py-5">Hora y Fecha Original</th>
                                            <th className="px-8 py-5">Estado</th>
                                            <th className="px-8 py-5 text-right pr-12">Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {poolLoading ? <tr><td colSpan="5" className="text-center py-6 font-bold opacity-50 uppercase tracking-widest text-xs">Cargando...</td></tr> :
                                            misReclamados.length === 0 ? <tr><td colSpan="5" className="py-10 text-center opacity-30 font-black uppercase text-xs tracking-[0.4em]">Sin Reclamados</td></tr> :
                                                misReclamados.map(p => (
                                                    <tr key={p.folio_i} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="px-8 py-5 text-[11px] font-bold text-slate-500">{p.folio_i}</td>
                                                        <td className="px-8 py-5 text-[11px] font-bold text-slate-500">{p.telefono || p.canal || '--'}</td>
                                                        <td className="px-8 py-5 text-[11px] font-bold text-slate-500">{p.hora} - {p.fecha}</td>
                                                        <td className="px-8 py-5"><span className="text-[10px] uppercase font-black tracking-widest bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg border border-emerald-200">{p.status}</span></td>
                                                        <td className="px-8 py-5 text-right pr-12">
                                                            <button onClick={() => setPoolModalClient(p)} className="px-5 py-2.5 bg-emerald-50 text-emerald-600 rounded-xl uppercase text-[9px] font-black border border-emerald-200 cursor-pointer hover:bg-emerald-100 transition-colors">Gestionar</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {misReclamados.length >= 10 ? (
                            <div className="glass p-10 rounded-[2.5rem] text-center border border-white">
                                <i className="fas fa-exclamation-triangle text-red-400 text-3xl mb-3"></i>
                                <p className="text-xs font-black text-red-500 uppercase tracking-widest leading-relaxed max-w-lg mx-auto">
                                    Límite de 10 prospectos alcanzado.<br />
                                    Gestiona tus prospectos actuales para liberar espacio.
                                </p>
                            </div>
                        ) : (
                            <>
                                <div className="flex justify-between items-center mb-2 px-4 mt-8">
                                    <h3 className="text-sm font-black text-slate-700 uppercase tracking-widest">Pool Libre</h3>
                                    {selectedIds.length > 0 && (
                                        <button onClick={handleTakeMultiple} className="px-6 py-2.5 bg-sky-500 text-white rounded-xl uppercase text-[10px] font-black hover:bg-sky-600 transition-colors shadow-md cursor-pointer border-none">
                                            Tomar {selectedIds.length} seleccionado(s)
                                        </button>
                                    )}
                                </div>
                                <div className="glass rounded-[3rem] shadow-sm overflow-hidden border border-white">
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left table-auto">
                                            <thead className="bg-slate-50/50 border-b border-slate-100 text-slate-400 text-[10px] uppercase font-black tracking-widest">
                                                <tr>
                                                    <th className="px-8 py-5 w-10"></th>
                                                    <th className="px-8 py-5"># Folio</th>
                                                    <th className="px-8 py-5">Teléfono o Canal</th>
                                                    <th className="px-8 py-5">Hora y Fecha Original</th>
                                                    <th className="px-8 py-5">Estado</th>
                                                    <th className="px-8 py-5 text-right pr-12">Acción</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {poolLoading ? <tr><td colSpan="6" className="text-center py-6 font-bold opacity-50 uppercase tracking-widest text-xs">Cargando...</td></tr> :
                                                    poolLibre.length === 0 ? <tr><td colSpan="6" className="py-24 text-center opacity-30 font-black uppercase text-xs tracking-[0.4em]">Pool Vacío</td></tr> :
                                                        poolLibrePaginated.map(p => {
                                                            const isSelected = selectedIds.includes(p.folio_i);
                                                            const canSelect = isSelected || selectedIds.length < allowedSelection;
                                                            return (
                                                                <tr key={p.folio_i} className={`hover:bg-slate-50/50 transition-colors ${isSelected ? 'bg-sky-50/50' : ''}`}>
                                                                    <td className="px-8 py-5">
                                                                        <input
                                                                            type="checkbox"
                                                                            checked={isSelected}
                                                                            onChange={() => handleToggleSelection(p.folio_i)}
                                                                            disabled={!canSelect}
                                                                            className="w-4 h-4 accent-sky-500 cursor-pointer"
                                                                        />
                                                                    </td>
                                                                    <td className="px-8 py-5 text-[11px] font-bold text-slate-500">{p.folio_i}</td>
                                                                    <td className="px-8 py-5 text-[11px] font-bold text-slate-500">{p.telefono || p.canal || '--'}</td>
                                                                    <td className="px-8 py-5 text-[11px] font-bold text-slate-500">{p.hora} - {p.fecha}</td>
                                                                    <td className="px-8 py-5"><span className="text-[10px] uppercase font-black tracking-widest bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">{p.status || 'LIBRE'}</span></td>
                                                                    <td className="px-8 py-5 text-right pr-12">
                                                                        <button onClick={() => takePool(p.folio_i)} disabled={!canSelect && !isSelected} className="px-5 py-2.5 bg-sky-50 text-sky-600 rounded-xl uppercase text-[9px] font-black hover:bg-sky-100 transition-colors border border-sky-200 cursor-pointer disabled:opacity-40">Apartar</button>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {totalPoolPages > 1 && (
                                    <div className="flex justify-center items-center gap-4 mt-6">
                                        <button onClick={() => setCurrentPagePool(p => Math.max(1, p - 1))} disabled={currentPagePool === 1} className="px-5 py-2 bg-white text-slate-500 rounded-xl font-black text-[10px] uppercase shadow-sm border border-slate-100 disabled:opacity-30 cursor-pointer hover:bg-slate-50 transition-colors tracking-widest">Anterior</button>
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Página {currentPagePool} de {totalPoolPages}</span>
                                        <button onClick={() => setCurrentPagePool(p => Math.min(totalPoolPages, p + 1))} disabled={currentPagePool === totalPoolPages} className="px-5 py-2 bg-white text-slate-500 rounded-xl font-black text-[10px] uppercase shadow-sm border border-slate-100 disabled:opacity-30 cursor-pointer hover:bg-slate-50 transition-colors tracking-widest">Siguiente</button>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                )
            };
            // --- FIN MÓDULO POOL ---

            const fetchAgents = async () => {
                try {
                    const res = await fetch('https://crmasesorasapi.libresdeumas.com/api/agents');
                    const data = await res.json();
                    if (Array.isArray(data)) setAgents(data);
                } catch (e) { console.error(e); }
            };

            const fetchClients = async (name, silent = false) => {
                if (!silent) setLoading(true);
                try {
                    const res = await fetch(`https://crmasesorasapi.libresdeumas.com/api/clients?asesora=${encodeURIComponent(name)}&t=${Date.now()}`);
                    const data = await res.json();
                    if (Array.isArray(data)) {
                        setClients(data.map(normalizeData));
                    }
                } catch (e) { console.error(e); }
                if (!silent) setLoading(false);
            };

            const handleSelectClient = async (id_db) => {
                setLoading(true);
                try {
                    const res = await fetch(`https://crmasesorasapi.libresdeumas.com/api/client-details?id=${id_db}`);
                    const fullData = await res.json();
                    if (fullData) {
                        setSelectedClient(normalizeData(fullData));
                        setModal('edit');
                    }
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const fetchMyCalendar = async () => {
                if (!showCalendar) {
                    setShowCalendar(true);
                    if (calendarEvents.length === 0) {
                        setLoadingCalendar(true);
                        try {
                            const res = await fetch('https://crmasesorasapi.libresdeumas.com/api/my-calendar', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ asesora: user })
                            });
                            const data = await res.json();
                            setCalendarEvents(Array.isArray(data) ? data : []);
                        } catch (err) { console.error("Error al cargar calendario maestro"); }
                        setLoadingCalendar(false);
                    }
                } else { setShowCalendar(false); }
            };

            const processQueue = async () => {
                if (isSyncing.current) return;
                const queue = JSON.parse(localStorage.getItem('crm_sync_queue') || '[]');
                setPendingCount(queue.length);
                if (queue.length === 0) return;

                isSyncing.current = true;
                const newQueue = [...queue];
                let changed = false;

                for (let i = 0; i < newQueue.length; i++) {
                    const item = newQueue[i];
                    try {
                        const res = await fetch(item.endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(item.payload)
                        });
                        const data = await res.json();
                        if (data.status === 'success' || data.message?.includes('ya existe') || res.status === 409) {
                            newQueue.splice(i, 1);
                            i--;
                            changed = true;
                        } else { break; }
                    } catch (err) { break; }
                }

                if (changed) {
                    localStorage.setItem('crm_sync_queue', JSON.stringify(newQueue));
                    setPendingCount(newQueue.length);
                    if (user) fetchClients(user, true);
                }
                isSyncing.current = false;
            };

            const filteredClients = useMemo(() => {
                const search = filters.name.toLowerCase();
                const todayMx = new Date(getMexicoDate() + "T00:00:00");
                const tomorrowMx = new Date(todayMx); tomorrowMx.setDate(todayMx.getDate() + 1);

                return clients.filter(c => {
                    const cName = (c.Nombre || '').toLowerCase();
                    const cPhone = (c.Canal || '').toString();
                    const matchesSearch = cName.includes(search) || cPhone.includes(search);
                    const matchesStatus = filters.status === '' || c['Estado Final'] === filters.status;
                    const matchesInterest = filters.interest === '' || (c['Nivel de Interés'] || '').includes(filters.interest);

                    let matchesDate = true;
                    if (filters.dateRange !== '') {
                        const proxStr = c['Fecha Próx. Contacto'];
                        if (!proxStr || proxStr === '--') { matchesDate = false; } else {
                            const [d, m, y] = proxStr.split('/').map(Number);
                            const pDate = new Date(y, m - 1, d);
                            const tVal = pDate.getTime();
                            if (filters.dateRange === 'hoy') matchesDate = tVal === todayMx.getTime();
                            else if (filters.dateRange === 'mañana') matchesDate = tVal === tomorrowMx.getTime();
                            else if (filters.dateRange === 'vencido') matchesDate = tVal < todayMx.getTime();
                            else if (filters.dateRange === 'futuro') matchesDate = tVal > tomorrowMx.getTime();
                        }
                    }
                    return matchesSearch && matchesStatus && matchesInterest && matchesDate;
                }).sort((a, b) => {
                    const dA = (a['Fecha 1er Contacto'] || '').split('/').reverse().join('');
                    const dB = (b['Fecha 1er Contacto'] || '').split('/').reverse().join('');
                    return dB.localeCompare(dA);
                });
            }, [clients, filters]);

            const paginatedClients = useMemo(() => {
                const start = (currentPage - 1) * entriesPerPage;
                return filteredClients.slice(start, start + entriesPerPage);
            }, [filteredClients, currentPage]);

            const totalPages = Math.max(1, Math.ceil(filteredClients.length / entriesPerPage));

            const handleLogin = async (name, password) => {
                setLoading(true);
                try {
                    const res = await fetch('https://crmasesorasapi.libresdeumas.com/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombre: name.trim(), password: password.trim() })
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        localStorage.setItem('crm_user', data.nombre);
                        setUser(data.nombre);
                        fetchClients(data.nombre);
                    } else {
                        setStatusAlert({ type: 'error', title: 'Acceso Denegado', message: data.message });
                    }
                } catch (e) {
                    setStatusAlert({ type: 'error', title: 'Error Localhost', message: "No se puede contactar con el servidor local." });
                }
                setLoading(false);
            };

            if (!user) return <LoginScreen agents={agents} onLogin={handleLogin} loading={loading} theme={activeTheme} />;

            return (
                <div className={`min-h-screen ${activeTheme.bg} p-4 md:p-8 transition-colors duration-500`}>
                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10">

                            <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-xl" style={{ backgroundColor: activeTheme.primary }}>

                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter uppercase leading-none">CRM Handshake</h1>
                                <p className="text-slate-400 text-[9px] font-bold uppercase tracking-[0.2em] mt-1.5">Asesora: <span className="text-slate-900">{user}</span> • Versión 6.1 Maestro</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-4 mt-6 md:mt-0">
                            <div className={`flex items-center gap-3 px-5 py-2.5 rounded-full border transition-all ${pendingCount > 0 ? 'bg-amber-50 text-amber-600 border-amber-200 sync-active' : 'bg-emerald-50 text-emerald-600 border-emerald-200'}`}>
                                <i className={`fas ${pendingCount > 0 ? 'fa-cloud-upload-alt' : 'fa-check-circle'} text-xs`}></i>
                                <span className="text-[10px] font-black uppercase tracking-widest">{pendingCount > 0 ? `${pendingCount} Sincronizando` : 'DB Local al Día'}</span>
                            </div>

                            <div className="flex items-center gap-3 glass p-2 rounded-full shadow-sm border border-white">
                                {Object.keys(THEMES).map(t => (
                                    <button key={t} onClick={() => { setThemeKey(t); localStorage.setItem('crm_theme', t); }} className={`w-6 h-6 rounded-full transition-all ${themeKey === t ? 'ring-2 ring-offset-2 ring-slate-300 scale-110 shadow-md' : 'opacity-30 hover:opacity-100'}`} style={{ backgroundColor: THEMES[t].primary }} />
                                ))}
                                <div className="w-px h-5 bg-slate-200 mx-1" />
                                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="text-slate-300 hover:text-red-500 p-1 transition-colors bg-transparent border-none outline-none"><i className="fas fa-power-off text-sm"></i></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto">
                        {/* --- INICIO MÓDULO POOL --- */}
                        <div className="flex bg-slate-100/50 rounded-full p-1.5 mb-8 max-w-md mx-auto border border-slate-200 shadow-sm">
                            <button onClick={() => setActiveTab('Mis Prospectos')} className={`flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-full transition-all border-none cursor-pointer outline-none ${activeTab === 'Mis Prospectos' ? 'bg-white shadow-md text-slate-800 pointer-events-none' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-200/50 bg-transparent'}`}>Mis Prospectos</button>
                            <button onClick={() => { setActiveTab('Pool'); fetchPool(); }} className={`flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-full transition-all border-none cursor-pointer outline-none ${activeTab === 'Pool' ? 'bg-white shadow-md text-sky-600 pointer-events-none' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-200/50 bg-transparent'}`}>Pool Clientes</button>
                        </div>
                        {activeTab === 'Pool' && <PoolView />}
                        {activeTab === 'Mis Prospectos' && (
                            <div className="animate-in fade-in">
                                {/* --- FIN MÓDULO POOL --- */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4 mb-8">
                                    <div className="lg:col-span-2 relative">
                                        <i className="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                                        <input type="text" placeholder="Buscar expediente..." className="w-full pl-12 pr-5 py-4 rounded-2xl border-none shadow-sm font-bold text-xs focus:ring-2 focus:ring-sky-300 outline-none transition-all" value={filters.name} onChange={e => setFilters({ ...filters, name: e.target.value })} />

                                    <select className="px-5 py-4 rounded-2xl border-none shadow-sm font-bold text-xs text-slate-500 outline-none cursor-pointer" value={filters.dateRange} onChange={e => setFilters({ ...filters, dateRange: e.target.value })}>
                                        <option value="">Semáforo</option>
                                        <option value="vencido">Vencidos 🔴</option>
                                        <option value="hoy">Para Hoy 🟠</option>
                                        <option value="mañana">Mañana 🟡</option>
                                        <option value="futuro">Próximos 🔵</option>
                                    </select>
                                    <select className="px-5 py-4 rounded-2xl border-none shadow-sm font-bold text-xs text-slate-500 outline-none cursor-pointer" value={filters.status} onChange={e => setFilters({ ...filters, status: e.target.value })}>

                                    <button onClick={() => { setShowHistoryModal(true); }} className="bg-white text-slate-400 font-bold py-4 px-4 rounded-2xl shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-2 uppercase text-[10px] tracking-widest border border-slate-100 outline-none">
